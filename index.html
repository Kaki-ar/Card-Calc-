<!DOCTYPE html>
<html>
<head>
  <title>Tier Crafter</title>

  <!-- PWA Meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input {
      width: 70px;
      margin: 5px;
      padding: 6px;
      text-align: center;
    }
    button {
      padding: 10px;
      margin: 8px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      margin-top: 15px;
      margin-left: auto;
      margin-right: auto;
    }
    td, th {
      border: 1px solid #555;
      padding: 6px 12px;
    }
  </style>
</head>

<body>

<h2>🎮 Tier Crafter</h2>

T1: <input id="t1" type="number" value="0"><br>
T2: <input id="t2" type="number" value="0"><br>
T3: <input id="t3" type="number" value="0"><br>
T4: <input id="t4" type="number" value="0"><br>
T5: <input id="t5" type="number" value="0"><br>

<button onclick="craft()">Craft Once</button>
<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>
function getV() {
  return {
    t1: +t1.value || 0,
    t2: +t2.value || 0,
    t3: +t3.value || 0,
    t4: +t4.value || 0,
    t5: +t5.value || 0
  };
}

function setV(v) {
  t1.value = v.t1;
  t2.value = v.t2;
  t3.value = v.t3;
  t4.value = v.t4;
  t5.value = v.t5;
}

function craft() {
  let v = getV();

  let made = {t2:0,t3:0,t4:0,t5:0,t6:0};

  let m2 = Math.floor(v.t1/2);
  v.t2 += m2; v.t1 -= m2*2; made.t2 = m2;

  let m3 = Math.floor(v.t2/3);
  v.t3 += m3; v.t2 -= m3*3; made.t3 = m3;

  let m4 = Math.floor(v.t3/4);
  v.t4 += m4; v.t3 -= m4*4; made.t4 = m4;

  let m5 = Math.floor(v.t4/5);
  v.t5 += m5; v.t4 -= m5*5; made.t5 = m5;

  let m6 = Math.floor(v.t5/6);
  v.t5 -= m6*6; made.t6 = m6;

  setV(v);

  output.innerHTML = `
    <h3>🛠 Crafted</h3>
    <table>
      <tr><th>Tier</th><th>Made</th></tr>
      <tr><td>T2</td><td>${made.t2}</td></tr>
      <tr><td>T3</td><td>${made.t3}</td></tr>
      <tr><td>T4</td><td>${made.t4}</td></tr>
      <tr><td>T5</td><td>${made.t5}</td></tr>
      <tr><td>T6</td><td>${made.t6}</td></tr>
    </table>
  `;
}

function analyze() {
  let v = getV();

  output.innerHTML = `
    <h3>📊 Analysis</h3>

    T2 → Need 2 T1 | Have ${v.t1} | Can make ${Math.floor(v.t1/2)}<br>
    T3 → Need 3 T2 | Have ${v.t2} | Can make ${Math.floor(v.t2/3)}<br>
    T4 → Need 4 T3 | Have ${v.t3} | Can make ${Math.floor(v.t3/4)}<br>
    T5 → Need 5 T4 | Have ${v.t4} | Can make ${Math.floor(v.t4/5)}<br>
    T6 → Need 6 T5 | Have ${v.t5} | Can make ${Math.floor(v.t5/6)}<br>
  `;
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
