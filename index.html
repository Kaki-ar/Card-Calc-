<!DOCTYPE html>
<html>
<head>
  <title>Tier Crafter</title>

  <!-- PWA Meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input {
      width: 70px;
      margin: 5px;
      padding: 6px;
      text-align: center;
    }
    button {
      padding: 10px;
      margin: 8px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      margin-top: 15px;
      margin-left: auto;
      margin-right: auto;
    }
    td, th {
      border: 1px solid #555;
      padding: 6px 12px;
    }
  </style>
</head>

<body>

<h2>🎮 Tier Crafter</h2>

T1: <input id="t1" type="number" value="0"><br>
T2: <input id="t2" type="number" value="0"><br>
T3: <input id="t3" type="number" value="0"><br>
T4: <input id="t4" type="number" value="0"><br>
T5: <input id="t5" type="number" value="0"><br>

<button onclick="craft()">Craft Once</button>
<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>
function craft() {
  let v = getV();

  // Store ORIGINAL values (important)
  let original = {...v};

  let made = {t2:0,t3:0,t4:0,t5:0,t6:0};

  // Only use ORIGINAL values — no chaining
  made.t2 = Math.floor(original.t1 / 2);
  made.t3 = Math.floor(original.t2 / 3);
  made.t4 = Math.floor(original.t3 / 4);
  made.t5 = Math.floor(original.t4 / 5);
  made.t6 = Math.floor(original.t5 / 6);

  // Now subtract used resources
  v.t1 -= made.t2 * 2;
  v.t2 -= made.t3 * 3;
  v.t3 -= made.t4 * 4;
  v.t4 -= made.t5 * 5;
  v.t5 -= made.t6 * 6;

  // Add crafted results
  v.t2 += made.t2;
  v.t3 += made.t3;
  v.t4 += made.t4;
  v.t5 += made.t5;

  setV(v);

  output.innerHTML = `
    <h3>🛠 Crafted (Real Mode)</h3>
    <table>
      <tr><th>Tier</th><th>Made</th></tr>
      <tr><td>T2</td><td>${made.t2}</td></tr>
      <tr><td>T3</td><td>${made.t3}</td></tr>
      <tr><td>T4</td><td>${made.t4}</td></tr>
      <tr><td>T5</td><td>${made.t5}</td></tr>
      <tr><td>T6</td><td>${made.t6}</td></tr>
    </table>
  `;
}
</script>

</body>
</html>
