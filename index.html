<button onclick="craft()">Craft Once</button>

<script>
function getV() {
  return {
    t1: Number(document.getElementById("t1").value) || 0,
    t2: Number(document.getElementById("t2").value) || 0,
    t3: Number(document.getElementById("t3").value) || 0,
    t4: Number(document.getElementById("t4").value) || 0,
    t5: Number(document.getElementById("t5").value) || 0
  };
}

function resetAll() {
  document.getElementById("t1").value = 0;
  document.getElementById("t2").value = 0;
  document.getElementById("t3").value = 0;
  document.getElementById("t4").value = 0;
  document.getElementById("t5").value = 0;
}

  let v = getV();

  let made = { t2:0, t3:0, t4:0, t5:0, t6:0 };

  // simple craft (no chaining confusion)
  made.t2 = Math.floor(v.t1 / 2);
  made.t3 = Math.floor(v.t2 / 3);
  made.t4 = Math.floor(v.t3 / 4);
  made.t5 = Math.floor(v.t4 / 5);
  made.t6 = Math.floor(v.t5 / 6);

  // show result
  document.getElementById("output").innerHTML = `
    <h3>🛠 Crafted</h3>
    <table>
      <tr><th>Tier</th><th>Made</th></tr>
      <tr><td>T2</td><td>${made.t2}</td></tr>
      <tr><td>T3</td><td>${made.t3}</td></tr>
      <tr><td>T4</td><td>${made.t4}</td></tr>
      <tr><td>T5</td><td>${made.t5}</td></tr>
      <tr><td>T6</td><td>${made.t6}</td></tr>
    </table>
  `;

  // 🔥 reset everything (kills the bug completely)
  resetAll();
}
</script>
